<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .content{
            height: 300px;
            background-color: lightblue;
            /* Enable the flex */
            display: flex;
            /* make the horizantal center */
            justify-content: center;
            /* vertical center */
            align-items: center;
            /* know this property will get applied to its child element and it will get center  */
        }
        .box{
            width: 100px;
            height: 100px;
            background-color: blue;
        }
    </style>

</head>


<body>
    
    <div class="content">
        <div class="box">Lorem ipsum dolor sit amet.</div>
    </div>

</body>
</html>

<!-- Use of display: flex for making the conetent center -->
